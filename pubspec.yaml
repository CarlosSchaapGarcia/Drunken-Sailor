name: drunken_sailor
description: Find the nearest open bar with pirate compass, submarine radar, and nuclear counter interfaces.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI and Navigation
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  
  # Sensors - magnetometer for compass heading
  sensors_plus: ^7.0.0
  
  # State Management
  flutter_riverpod: ^2.4.0
  
  # Database
  firebase_core: ^2.20.0
  cloud_firestore: ^4.13.0
  firebase_analytics: ^10.7.0
  
  # Utilities
  intl: ^0.19.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
